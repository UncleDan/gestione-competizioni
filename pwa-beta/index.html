<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#3b82f6">
<title>Gestione Competizioni Baskin</title>
<link rel="icon" href="/gestione-competizioni/pwa/icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Georgia,serif;
  background:linear-gradient(135deg,#0a0e1a 0%,#0f172a 50%,#0a1628 100%);
  min-height:100vh;color:#e2e8f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.logo{
  font-size:48px;margin-bottom:16px;
}
h1{
  font-size:22px;font-weight:normal;letter-spacing:3px;
  color:#fff;text-align:center;margin-bottom:6px;
}
.sub{
  font-size:12px;color:#64748b;letter-spacing:2px;
  text-align:center;margin-bottom:48px;
}
.moduli{
  display:flex;flex-direction:column;gap:14px;
  width:100%;max-width:440px;
}
.modulo{
  display:flex;align-items:center;gap:16px;
  background:#0d1f3c;border:1px solid #1e3a5f;
  border-radius:8px;padding:18px 22px;
  text-decoration:none;color:inherit;
  transition:border-color .2s,background .2s;
  cursor:pointer;
}
.modulo:hover{background:#112440;border-color:#3b82f6;}
.modulo-icon{font-size:28px;flex-shrink:0;}
.modulo-info{flex:1;}
.modulo-nome{font-size:16px;color:#fff;margin-bottom:3px;}
.modulo-desc{font-size:11px;color:#64748b;letter-spacing:1px;}
.modulo-anno{
  font-size:11px;color:#3b82f6;
  background:#0a1628;border:1px solid #1e3a5f;
  border-radius:4px;padding:2px 8px;flex-shrink:0;
}
.modulo.disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}

.footer{
  margin-top:48px;font-size:10px;color:#334155;
  letter-spacing:2px;text-align:center;
}
#install-btn{
  display:none;margin-top:24px;
  padding:10px 24px;
  background:transparent;border:1px solid #3b82f6;
  border-radius:4px;color:#3b82f6;
  font-family:Georgia,serif;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
}
#install-btn:hover{background:#0d1f3c;}
#check-update-btn{
  margin-top:12px;
  padding:9px 20px;
  background:transparent;border:1px solid #334155;
  border-radius:4px;color:#475569;
  font-family:Georgia,serif;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:border-color .2s,color .2s;
}
#check-update-btn:hover{border-color:#64748b;color:#94a3b8;}
#check-update-btn.checking{border-color:#f59e0b;color:#f59e0b;}
#check-update-btn.updated{border-color:#22c55e;color:#22c55e;}
#sw-status{
  margin-top:12px;font-size:10px;color:#475569;letter-spacing:1px;
}

#update-toast {
  display:none;
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1d4ed8;color:#fff;
  padding:12px 20px;border-radius:8px;
  font-size:13px;letter-spacing:1px;
  box-shadow:0 4px 20px rgba(59,130,246,.5);
  z-index:9999;cursor:pointer;
  display:none;align-items:center;gap:10px;
  white-space:nowrap;
}
#update-toast.visible { display:flex; }
#update-toast:hover { background:#1e40af; }
</style>
</head>
<body>

<div class="logo">🏀</div>
<h1>Gestione Competizioni</h1>
<div class="sub">BASKIN · UNCLEDAN.IT</div>
<div style="display:inline-block;margin:6px auto;padding:3px 12px;background:#f59e0b;color:#000;border-radius:12px;font-size:10px;font-weight:bold;letter-spacing:1px">⚠ VERSIONE BETA</div>

<div class="moduli" id="moduli-list">
  <!-- Popolato da JS leggendo modules.json o lista statica -->
</div>

<button id="install-btn">⬇ Installa App</button>
<button id="check-update-btn" onclick="verificaAggiornamenti()">🔄 Verifica aggiornamenti</button>
<div id="sw-status"></div>

<div class="footer">
  <div>Launcher v 2.0 · 2026 · uncledan.it</div>
  <div style="margin-top:4px;color:#1e3a5f">sw.js v 3.0b5 · manifest v 1.3</div>
</div>

<div id="update-toast" onclick="applicaAggiornamento()">
  🔄 <span id="toast-msg">Aggiornamento disponibile</span>
  <span style="opacity:.7;font-size:11px">Tocca per aggiornare</span>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIGURAZIONE — modificare qui per creare un nuovo ramo
//   BASEDIR : root del repository su GitHub Pages
//   BASE    : cartella di questa istanza (pwa, pwa-beta, ecc.)
// ══════════════════════════════════════════════════════════
const BASEDIR = '/gestione-competizioni';
const BASE    = BASEDIR + '/pwa-beta';

async function verificaAggiornamenti(){
  const btn = document.getElementById('check-update-btn');
  btn.textContent = '🔄 Controllo in corso...';
  btn.className = 'checking';
  try {
    // Versione in cache (quello che l'utente ha ora)
    const cached  = await caches.match(`${BASE}/versions.json`);
    const current = cached ? await cached.json() : null;

    // Versione remota — sempre fresh, bypassa la cache
    const res = await fetch(`${BASE}/versions.json?_=${Date.now()}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const remote = await res.json();

    if(!current){
      // Nessuna cache SW (pagina aperta senza SW o prima visita):
      // confronta direttamente con la versione del launcher caricato
      const launcherVer = '3.0b12'; // versione di questo file
      // Versioni note di questa build — usate come fallback se cache non disponibile
      const KNOWN_VERSIONS = {
        'finali.html':    '3.0b12',
        'pwa/index.html': '1.9',
        'sw.js':          '2.10',
        'manifest.json':  '1.3',
      };
      const remoteVer   = remote['pwa/index.html'];
      if(remoteVer && remoteVer !== launcherVer){
        mostraToast('Aggiornamento disponibile — ricarica la pagina');
        btn.textContent = '⬆ Aggiornamento disponibile';
      } else {
        btn.textContent = '✓ Tutto aggiornato';
        btn.className = 'updated';
        setTimeout(()=>{ btn.textContent='🔄 Verifica aggiornamenti'; btn.className=''; },3000);
      }
      return;
    }

    // Use cache if available, otherwise fall back to KNOWN_VERSIONS
    const baseline = current || KNOWN_VERSIONS;
    const diff = Object.entries(remote).filter(([k,v]) => baseline[k] !== v);

    if(diff.length === 0){
      btn.textContent = '✓ Tutto aggiornato';
      btn.className = 'updated';
      setTimeout(()=>{ btn.textContent='🔄 Verifica aggiornamenti'; btn.className=''; },3000);
    } else {
      const cmp=(a,b)=>{
        const pa=String(a).split('.').map(Number),pb=String(b).split('.').map(Number);
        for(let i=0;i<Math.max(pa.length,pb.length);i++){const x=pa[i]||0,y=pb[i]||0;if(x!==y)return x<y?-1:1;}
        return 0;
      };
      const isDowngrade=diff.some(([k,v])=>baseline[k]&&cmp(v,baseline[k])<0);
      if(isDowngrade){
        const lista=diff.map(([k,v])=>`${k}: ${baseline[k]} → ${v}`).join('\n');
        const ok=confirm('⚠ DOWNGRADE RILEVATO\n\nLe versioni online sono più vecchie di quelle installate:\n\n'+lista+'\n\nProcedere con il downgrade?');
        if(!ok){btn.textContent='✕ Annullato';btn.className='';setTimeout(()=>{btn.textContent='🔄 Verifica aggiornamenti';},3000);return;}
        mostraToast('Downgrade in corso — ricarica per applicare');
        btn.textContent='⬇ Downgrade...';
      } else {
        mostraToast(`Aggiornamento disponibile (${diff.length} file)`);
        btn.textContent=`⬆ ${diff.length} aggiornament${diff.length>1?'i':'o'}`;
      }
      btn.className='';
      if('serviceWorker' in navigator){
        const reg=await navigator.serviceWorker.getRegistration(`${BASE}/`);
        if(reg)await reg.update();
      }
    }
  } catch(err){
    btn.textContent = '⚠ Errore verifica';
    btn.className = '';
    setTimeout(()=>{ btn.textContent='🔄 Verifica aggiornamenti'; },3000);
  }
}

// ── Elenco moduli (aggiungere qui i futuri) ───────────────────────────────
const MODULI = [
  {
    id: 'finali-2026',
    nome: 'Finali Nazionali',
    desc: 'Sorteggio gironi · Designazioni arbitrali · Risultati',
    anno: '2026',
    versione: '3.0b12',
    file: `${BASE}/finali.html`,
    icon: '🏆',
    attivo: true,
  },
  // Aggiungere futuri moduli qui:
  // { id:'...', nome:'...', desc:'...', anno:'...', file:`${BASE}/...html`, icon:'...', attivo:false },
];

function renderModuli() {
  const el = document.getElementById('moduli-list');
  el.innerHTML = MODULI.map(m => `
    <a class="modulo${m.attivo?'':' disabled'}" href="${m.attivo ? m.file : '#'}">
      <span class="modulo-icon">${m.icon}</span>
      <div class="modulo-info">
        <div class="modulo-nome">${m.nome}</div>
        <div class="modulo-desc">${m.desc}</div>
        ${m.versione?`<div style="font-size:9px;color:#334155;margin-top:3px">v ${m.versione}</div>`:''}
      </div>
      <span class="modulo-anno">${m.anno}</span>
    </a>`
  ).join('');
}

// ── Service Worker + Update Detection ────────────────────────────────────
let _newWorker = null;

function mostraToast(msg){
  const t = document.getElementById('update-toast');
  if(msg) document.getElementById('toast-msg').textContent = msg;
  t.classList.add('visible');
}

function applicaAggiornamento(){
  if(_newWorker) _newWorker.postMessage({type:'SKIP_WAITING'});
  else window.location.reload();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(`${BASE}/sw.js`, { scope: `${BASE}/` })
    .then(reg => {
      document.getElementById('sw-status').textContent = '✓ Offline disponibile';

      // Aggiornamento già in attesa al momento della registrazione
      if(reg.waiting){
        _newWorker = reg.waiting;
        mostraToast('Aggiornamento disponibile');
      }

      // Nuovo SW trovato durante la sessione
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw.addEventListener('statechange', () => {
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            _newWorker = nw;
            mostraToast('Aggiornamento disponibile');
          }
        });
      });
    })
    .catch(() => {
      document.getElementById('sw-status').textContent = '⚠ Offline non disponibile';
    });

  // SW attivato → ricarica per usare la nuova versione
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(!refreshing){ refreshing=true; window.location.reload(); }
  });
}

// ── Install prompt ────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'inline-block';
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted')
    document.getElementById('install-btn').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
});

renderModuli();
</script>
</body>
</html>
